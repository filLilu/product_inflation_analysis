services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER} 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 10s
      retries: 8

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: airflow_webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./raw_data:/opt/airflow/raw_data
      - ./transformed_data:/opt/airflow/transformed_data
      - ./model:/opt/airflow/model
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: >
      bash -c "
        echo 'Waiting for PostgreSQL initialization...'
        sleep 30
        echo 'Initializing Airflow database...'
        airflow db init && airflow webserver
      "
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: airflow_scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow
    env_file:
      - .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./raw_data:/opt/airflow/raw_data
      - ./transformed_data:/opt/airflow/transformed_data
      - ./model:/opt/airflow/model
      - ./logs:/opt/airflow/logs
    command: >
      bash -c "sleep 60 && airflow db init && airflow scheduler"
    depends_on:
      - airflow-webserver

  metabase:
    image: metabase/metabase:latest
    container_name: metabase_app
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${METABASE_DB_PASSWORD}
      - MB_DB_HOST=postgres
    ports:
      - "3000:3000"
    volumes:
      - metabase-data:/home/app/metabase
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        echo 'Waiting for PostgreSQL to be ready...'
        while ! nc -z postgres 5432; do
          sleep 2
        done
        echo 'PostgreSQL is ready, waiting 20 seconds for DB initialization...'
        sleep 20
        java -jar /app/metabase.jar
      "
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_data:
  metabase-data: